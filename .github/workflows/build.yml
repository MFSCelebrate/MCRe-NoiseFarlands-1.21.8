name: Build Custom Minecraft 1.21.11

on:
  push:
    branches: [ "main", "1.21.11" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 下载原版 Minecraft 1.21.11 client jar
        run: |
          curl -s -o version_manifest.json https://launchermeta.mojang.com/mc/game/version_manifest.json
          VERSION_URL=$(cat version_manifest.json | jq -r '.versions[] | select(.id=="1.21.11") | .url')
          curl -s -o version.json $VERSION_URL
          CLIENT_URL=$(cat version.json | jq -r '.downloads.client.url')
          wget -O original.jar $CLIENT_URL

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      - name: 编译修改的类
        id: build
        run: |
          ./gradlew remapJar --no-daemon 2>&1 | tee full.log
          grep -B 2 -A 5 "error:" full.log > compile_errors.log || true
          rm -f full.log
        continue-on-error: true

      - name: 上传编译错误日志
        uses: actions/upload-artifact@v4
        with:
          name: CompileErrors
          path: compile_errors.log
          if-no-files-found: warn

      - name: 检查 modified.jar 是否生成
        run: |
          if [ ! -f build/libs/modified.jar ]; then
            echo "错误: modified.jar 未生成！"
            exit 1
          fi
          echo "✅ modified.jar 已生成"
          echo "包含的 class 文件："
          jar tf build/libs/modified.jar | grep '\.class$' || echo "（无 class 文件）"

      - name: 合并所有修改到原版 jar
        run: |
          # 创建临时目录
          mkdir -p merged
          cd merged
          
          # 1. 解压原版 jar（所有 class）
          echo "解压原版 jar..."
          jar xf ../original.jar
          
          # 2. 解压 modified.jar，覆盖修改的 class
          echo "解压 modified.jar，覆盖修改的 class..."
          jar xf ../build/libs/modified.jar
          
          # 3. 删除签名文件（避免 SecurityException）
          echo "删除签名文件..."
          rm -f META-INF/*.SF META-INF/*.RSA META-INF/*.DSA
          
          # 4. 重新打包成完整 jar
          echo "重新打包..."
          jar cfm ../minecraft-1.21.11-custom-full.jar META-INF/MANIFEST.MF .
          
          cd ..
          echo "✅ 完整 jar 已生成：minecraft-1.21.11-custom-full.jar"

      - name: 验证最终产物
        run: |
          echo "=== 最终产物大小 ==="
          ls -lh minecraft-1.21.11-custom-full.jar
          echo "=== 包含的 class 文件数量 ==="
          jar tf minecraft-1.21.11-custom-full.jar | grep '\.class$' | wc -l

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-1.21.11-Custom
          path: minecraft-1.21.11-custom-full.jar
          if-no-files-found: error
