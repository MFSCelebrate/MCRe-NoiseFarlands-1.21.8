name: Build Custom Minecraft 1.21.11

on:
  push:
    branches: [ "main", "1.21.11" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 下载原版 Minecraft 1.21.11 client jar
        run: |
          curl -s -o version_manifest.json https://launchermeta.mojang.com/mc/game/version_manifest.json
          VERSION_URL=$(cat version_manifest.json | jq -r '.versions[] | select(.id=="1.21.11") | .url')
          curl -s -o version.json $VERSION_URL
          CLIENT_URL=$(cat version.json | jq -r '.downloads.client.url')
          wget -O original.jar $CLIENT_URL

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      - name: 编译并 remap（生成 modified.jar，包含混淆后的 class）
        run: |
          ./gradlew remapJar --no-daemon 2>&1 | tee full.log
          grep -B 2 -A 5 "error:" full.log > compile_errors.log || true
          rm -f full.log
        continue-on-error: true

      - name: 上传编译错误日志
        uses: actions/upload-artifact@v4
        with:
          name: CompileErrors
          path: compile_errors.log
          if-no-files-found: warn

      - name: 查看 modified.jar 内容（确认混淆名）
        run: |
          echo "===== modified.jar 中的类（Mojang 混淆名） ====="
          jar tf build/libs/modified.jar | grep -E "\.class$" | head -30

      - name: 解压原版 jar
        run: |
          rm -rf extracted
          mkdir -p extracted
          cd extracted
          jar xf ../original.jar
          cd ..

      - name: 用 modified.jar 覆盖原版中的同名类（全量解压覆盖）
        run: |
          cd extracted
          jar xf ../build/libs/modified.jar
          # 删除签名文件（防止校验失败）
          rm -f META-INF/*.SF META-INF/*.RSA META-INF/*.DSA
          cd ..

      - name: 重新打包完整 jar
        run: |
          cd extracted
          jar cfm ../minecraft-1.21.11-custom-full.jar META-INF/MANIFEST.MF .
          cd ..

      - name: 验证关键类是否被正确覆盖
        run: |
          echo "===== 验证 glv.class（DebugEntryVersion） ====="
          jar tf minecraft-1.21.11-custom-full.jar | grep "glv.class"
          echo "===== 验证 dwo.class（ChunkPos） ====="
          jar tf minecraft-1.21.11-custom-full.jar | grep "dwo.class"
          echo "===== 验证 class_1184（WorldBorder） ====="
          jar tf minecraft-1.21.11-custom-full.jar | grep "class_1184.class"
          echo "===== 验证 arp（WorldBorderCommand） ====="
          jar tf minecraft-1.21.11-custom-full.jar | grep "arp.class"
          echo "===== 验证原版 class_2588（TranslatableContents）仍然存在 ====="
          jar tf minecraft-1.21.11-custom-full.jar | grep "class_2588.class" || echo "❌ class_2588 缺失！"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-1.21.11-Custom
          path: minecraft-1.21.11-custom-full.jar
          if-no-files-found: error
