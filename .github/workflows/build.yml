name: Build Custom Minecraft 1.21.11

on:
  push:
    branches: [ "main", "1.21.11" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 下载原版 Minecraft 1.21.11 client jar
        run: |
          curl -s -o version_manifest.json https://launchermeta.mojang.com/mc/game/version_manifest.json
          VERSION_URL=$(cat version_manifest.json | jq -r '.versions[] | select(.id=="1.21.11") | .url')
          curl -s -o version.json $VERSION_URL
          CLIENT_URL=$(cat version.json | jq -r '.downloads.client.url')
          wget -O original.jar $CLIENT_URL

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      - name: 编译修改的类
        id: build
        run: |
          ./gradlew remapJar --no-daemon 2>&1 | tee full.log
          grep -B 2 -A 5 "error:" full.log > compile_errors.log || true
          rm -f full.log
        continue-on-error: true

      - name: 上传编译错误日志
        uses: actions/upload-artifact@v4
        with:
          name: CompileErrors
          path: compile_errors.log
          if-no-files-found: warn

      - name: 检查 modified.jar 是否生成
        run: |
          if [ ! -f build/libs/modified.jar ]; then
            echo "错误: modified.jar 未生成！"
            exit 1
          fi
          echo "✅ modified.jar 已生成"

      - name: 显示源文件到混淆类的映射
        run: |
          echo "=== 源文件 -> 混淆类 映射 ==="
          mkdir -p temp_classes
          cd temp_classes
          jar xf ../build/libs/modified.jar
          
          echo "| 源文件 | 混淆类 |"
          echo "|--------|--------|"
          find . -name "*.class" | while read -r class_file; do
            class_name=$(basename "$class_file" .class)
            source_file=$(javap -v "$class_file" 2>/dev/null | grep "SourceFile" | head -1 | sed 's/.*"\(.*\)"/\1/' || echo "未知")
            echo "| $source_file | $class_name.class |"
          done
          cd ..
          rm -rf temp_classes

      - name: 合并所有修改到原版 jar
        run: |
          mkdir -p merged
          cd merged
          echo "解压原版 jar..."
          jar xf ../original.jar
          echo "解压 modified.jar，覆盖修改的 class..."
          jar xf ../build/libs/modified.jar
          echo "删除签名文件..."
          rm -f META-INF/*.SF META-INF/*.RSA META-INF/*.DSA
          echo "重新打包..."
          jar cfm ../minecraft-1.21.11-custom-full.jar META-INF/MANIFEST.MF .
          cd ..
          echo "✅ 完整 jar 已生成：minecraft-1.21.11-custom-full.jar"

      - name: 验证最终产物中的修改类
        run: |
          echo "=== 最终产物中修改类的存在情况 ==="
          # 提取 modified.jar 中的所有 class 文件路径（相对路径）
          MODIFIED_CLASSES=$(jar tf build/libs/modified.jar | grep '\.class$')
          if [ -z "$MODIFIED_CLASSES" ]; then
            echo "⚠️ 警告: modified.jar 中没有 class 文件！"
            exit 0
          fi
          MISSING=0
          while IFS= read -r class_path; do
            if jar tf minecraft-1.21.11-custom-full.jar | grep -q "^${class_path}$"; then
              echo "✅ $class_path 存在"
            else
              echo "❌ $class_path 不存在"
              MISSING=$((MISSING+1))
            fi
          done <<< "$MODIFIED_CLASSES"
          if [ $MISSING -gt 0 ]; then
            echo "⚠️ 共有 $MISSING 个 class 缺失"
          else
            echo "🎉 所有修改的 class 都已成功注入"
          fi

      - name: 验证最终产物
        run: |
          echo "=== 最终产物大小 ==="
          ls -lh minecraft-1.21.11-custom-full.jar
          echo "=== 包含的 class 文件总数 ==="
          jar tf minecraft-1.21.11-custom-full.jar | grep '\.class$' | wc -l

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-1.21.11-Custom
          path: minecraft-1.21.11-custom-full.jar
          if-no-files-found: error
