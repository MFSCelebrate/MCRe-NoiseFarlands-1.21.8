name: Build Custom Minecraft 1.21.11

on:
  push:
    branches: [ "main", "1.21.11" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 下载原版 Minecraft 1.21.11 client jar
        run: |
          curl -s -o version_manifest.json https://launchermeta.mojang.com/mc/game/version_manifest.json
          VERSION_URL=$(cat version_manifest.json | jq -r '.versions[] | select(.id=="1.21.11") | .url')
          curl -s -o version.json $VERSION_URL
          CLIENT_URL=$(cat version.json | jq -r '.downloads.client.url')
          wget -O original.jar $CLIENT_URL

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      - name: 编译并 remap 修改后的类（只编译 11 个核心类）
        id: build
        run: |
          # 编译并输出日志
          ./gradlew remapJar --no-daemon 2>&1 | tee full.log
          # 提取错误信息（如果有）
          grep -B 2 -A 5 "error:" full.log > compile_errors.log || true
          rm -f full.log
        continue-on-error: true

      - name: 上传编译错误日志（如果有）
        uses: actions/upload-artifact@v4
        with:
          name: CompileErrors
          path: compile_errors.log
          if-no-files-found: warn

      - name: 检查 modified.jar 是否生成
        run: |
          if [ ! -f build/libs/modified.jar ]; then
            echo "错误: modified.jar 未生成！"
            exit 1
          fi
          echo "modified.jar 已生成，内容如下："
          jar tf build/libs/modified.jar

      - name: 准备合并目录
        run: |
          rm -rf extracted
          mkdir -p extracted

      - name: 解压原版 jar
        run: |
          cd extracted
          jar xf ../original.jar
          cd ..

      - name: 合并 modified.jar 中的所有类（覆盖同路径）
        run: |
          cd extracted
          jar xf ../build/libs/modified.jar
          # 删除 Mojang 签名文件（防止签名校验失败）
          rm -f META-INF/*.SF META-INF/*.RSA META-INF/*.DSA
          cd ..

      - name: 重新打包完整 jar
        run: |
          cd extracted
          jar cfm ../minecraft-1.21.11-custom-full.jar META-INF/MANIFEST.MF .
          cd ..

      - name: 验证最终产物（关键类检查）
        run: |
          echo "===== 验证修改的类是否存在 ====="
          jar tf minecraft-1.21.11-custom-full.jar | grep -E "glv|class_1184|arp" | head -20 || echo "⚠️ 未找到修改的类？"
          echo "===== 验证原版关键类是否存在（class_2588 = TranslatableContents） ====="
          jar tf minecraft-1.21.11-custom-full.jar | grep class_2588 || echo "❌ class_2588 缺失！"
          echo "===== 验证 WorldBorder 相关类 ====="
          jar tf minecraft-1.21.11-custom-full.jar | grep -i "worldborder" | head -10 || echo "⚠️ 未找到 WorldBorder 类？"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-1.21.11-Custom
          path: minecraft-1.21.11-custom-full.jar
          if-no-files-found: error
