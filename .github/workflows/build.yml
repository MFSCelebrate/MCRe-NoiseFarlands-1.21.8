name: Build Yarn Mapping Minecraft 1.21.8

on:
  push:
    branches: [ "1.21.8-YarnRepMain" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      # ========== 新增：自动修复 Record 类 ==========
      - name: 修复 Record 类（删除 extends Record）
        run: find src/main/java -name "*.java" -exec sed -i 's/ extends Record//g' {} \;

      - name: 修复 HashCodeOps/NullOps/NbtOps 的 extends 缺失
        run: |
          # 修复 HashCodeOps.java
          sed -i '502s/.*/    final class Builder extends AbstractUniversalBuilder<HashCode, List<Pair<HashCode, HashCode>>> {/' src/main/java/net/minecraft/util/dynamic/HashCodeOps.java
          sed -i '503d' src/main/java/net/minecraft/util/dynamic/HashCodeOps.java

          # 修复 NullOps.java
          sed -i '339s/.*/    static final class NullMapBuilder extends AbstractUniversalBuilder<Unit, Unit> {/' src/main/java/net/minecraft/util/dynamic/NullOps.java
          sed -i '340d' src/main/java/net/minecraft/util/dynamic/NullOps.java

          # 修复 NbtOps.java
          sed -i '689s/.*/    class MapBuilder extends AbstractStringBuilder<NbtElement, NbtCompound> {/' src/main/java/net/minecraft/nbt/NbtOps.java
          sed -i '690d' src/main/java/net/minecraft/nbt/NbtOps.java
      
      - name: 构建完整核心
        run: ./gradlew compileJava --no-daemon

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-1.21.8-Custom
          path: build/libs/minecraft-*.jar
          if-no-files-found: error
