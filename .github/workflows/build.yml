name: Build Yarn Mapping Minecraft 1.21.8

on:
  push:
    branches: [ "1.21.8-YarnRepMain" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      # ====== 增强的自动修复 ======
      - name: 自动修复 Record / Enum / 构造器问题
        run: |
          python3 - << 'EOF'
          import os, re, sys
          from pathlib import Path

          def get_java_files(root):
              return list(Path(root).rglob("*.java"))

          def fix_file(filepath):
              with open(filepath, 'r', encoding='utf-8') as f:
                  content = f.read()
              original = content

              # 匹配 Record 类（支持内部类）
              record_pattern = re.compile(
                  r'^(?P<indent>\s*)public\s+(?:static\s+)?(?:final\s+)?class\s+(?P<name>\w+)\s+extends\s+Record\s*\{',
                  re.MULTILINE
              )
              enum_pattern = re.compile(
                  r'^(?P<indent>\s*)public\s+(?:static\s+)?(?:final\s+)?class\s+(?P<name>\w+)\s+extends\s+Enum\s*\{',
                  re.MULTILINE
              )

              lines = content.splitlines()
              new_lines = []
              i = 0
              while i < len(lines):
                  line = lines[i]
                  m_rec = record_pattern.match(line)
                  m_enum = enum_pattern.match(line)

                  if m_rec or m_enum:
                      indent = m_rec.group('indent') if m_rec else m_enum.group('indent')
                      class_name = m_rec.group('name') if m_rec else m_enum.group('name')
                      is_record = bool(m_rec)

                      # 定位类体
                      start = i
                      brace_count = 0
                      j = i
                      while j < len(lines):
                          for ch in lines[j]:
                              if ch == '{': brace_count += 1
                              elif ch == '}':
                                  brace_count -= 1
                                  if brace_count == 0: break
                          if brace_count == 0: break
                          j += 1
                      body_lines = lines[start+1:j]

                      if is_record:
                          # 1. 提取非静态 final 字段作为 record 组件
                          field_pattern = re.compile(
                              r'^\s*(?:public|private|protected)?\s*(?:static\s+)?(?:final\s+)?(\w+)\s+(\w+)\s*(?:=.*)?;$'
                          )
                          components = []
                          for b_line in body_lines:
                              fm = field_pattern.match(b_line)
                              if fm and 'static' not in b_line:
                                  comp_type = fm.group(1)
                                  comp_name = fm.group(2)
                                  # 忽略特殊名称
                                  if not comp_name.startswith('field_') and not comp_name.startswith('_'):
                                      components.append((comp_type, comp_name))

                          # 如果没提取到，从构造器参数取
                          if not components:
                              ctor_pattern = re.compile(
                                  r'public\s+' + re.escape(class_name) + r'\s*\(([^)]*)\)'
                              )
                              for b_line in body_lines:
                                  cm = ctor_pattern.search(b_line)
                                  if cm:
                                      params = cm.group(1)
                                      # 去掉可能残留的 ', this' 等
                                      params = re.sub(r',\s*this\s*', '', params)
                                      param_parts = [p.strip() for p in params.split(',') if p.strip()]
                                      for p in param_parts:
                                          # 去掉 final 等修饰
                                          parts = [x for x in p.split() if x not in ('final', 'public', 'private', 'protected')]
                                          if len(parts) >= 2:
                                              comp_type = parts[-2]
                                              comp_name = parts[-1]
                                              components.append((comp_type, comp_name))
                                      break

                          # 生成 record 声明
                          comp_str = ', '.join([f'{t} {n}' for t, n in components])
                          new_decl = f'{indent}public record {class_name}({comp_str}) {{'
                          new_lines.append(new_decl)

                          # 清理类体：删除字段声明、删除 ObjectMethods 方法、删除错误构造器
                          body_str = '\n'.join(body_lines)
                          # 删除字段行
                          body_str = re.sub(r'^\s*(?:public|private|protected)?\s*(?:static\s+)?(?:final\s+)?\w+\s+\w+\s*(?:=.*)?;$', '', body_str, flags=re.MULTILINE)
                          # 删除 ObjectMethods 方法（toString/hashCode/equals）
                          body_str = re.sub(
                              r'(?s)@Override\s+public\s+(?:final\s+)?(?:String|int|boolean)\s+(?:toString|hashCode|equals)\s*\([^)]*\)\s*\{[^}]*ObjectMethods\.bootstrap[^}]*\}',
                              '',
                              body_str
                          )
                          # 删除任何包含 ', this' 的构造器调用（如 super(..., this) 等）
                          body_str = re.sub(r'\([^)]*,\s*this\s*\)', '()', body_str)
                          # 删除多余的构造器定义（如果参数与组件匹配），保留可能存在的自定义构造器
                          # 这里简化：删除所有以类名开头的构造器（因为 record 会自动生成）
                          # 但如果构造器有额外逻辑，可能需要保留，但反编译通常无自定义逻辑，可安全删除
                          body_str = re.sub(
                              r'(?s)public\s+' + re.escape(class_name) + r'\s*\([^)]*\)\s*\{[^}]*\}',
                              '',
                              body_str
                          )

                          # 缩进处理
                          for bline in body_str.splitlines():
                              if bline.strip():
                                  new_lines.append('    ' + bline)
                              else:
                                  new_lines.append('')
                          new_lines.append(indent + '}')

                      else:
                          # 处理 Enum
                          const_pattern = re.compile(r'^\s*public\s+static\s+final\s+\w+\s+(\w+)\s*=\s*new\s+\w+\(.*\);')
                          consts = []
                          other_lines = []
                          for b_line in body_lines:
                              cm = const_pattern.match(b_line)
                              if cm:
                                  consts.append(cm.group(1))
                              else:
                                  if 'values()' not in b_line and 'valueOf' not in b_line:
                                      other_lines.append(b_line)
                          new_decl = f'{indent}public enum {class_name} {{'
                          new_lines.append(new_decl)
                          if consts:
                              const_str = ',\n    '.join(consts)
                              new_lines.append('    ' + const_str + ';')
                          for b_line in other_lines:
                              if b_line.strip():
                                  new_lines.append('    ' + b_line)
                              else:
                                  new_lines.append('')
                          new_lines.append(indent + '}')

                      i = j + 1
                      continue

                  new_lines.append(line)
                  i += 1

              new_content = '\n'.join(new_lines)
              if new_content != original:
                  with open(filepath, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  return True
              return False

          root = 'src/main/java'
          if not os.path.exists(root):
              print("目录 src/main/java 不存在，跳过")
              sys.exit(0)

          fixed = 0
          for java_file in get_java_files(root):
              if fix_file(java_file):
                  fixed += 1
                  print(f"Fixed: {java_file}")
          print(f"✅ 共修复 {fixed} 个文件")
          EOF

      - name: 构建完整核心
        run: ./gradlew compileJava --no-daemon

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-1.21.8-Custom
          path: build/libs/minecraft-*.jar
          if-no-files-found: error
