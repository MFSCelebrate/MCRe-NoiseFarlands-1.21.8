plugins {
    id 'java'
    id 'fabric-loom' version '1.15-SNAPSHOT'
}

repositories {
    mavenCentral()
    maven { url 'https://maven.fabricmc.net/' }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    
    // Fabric API 依赖（所有模块）
    modImplementation "net.fabricmc:fabric-loader:0.18.4"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.136.1+1.21.8"
    
    compileOnly 'org.jspecify:jspecify:1.0.0'
    compileOnly 'javax.annotation:javax.annotation-api:1.3.2'
    compileOnly 'com.google.code.findbugs:jsr305:3.0.2'
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

// ========== 编译源码 ==========
sourceSets {
    main {
        java {
            include 'net/minecraft/client/gui/hud/DebugHud.java'
            include 'net/minecraft/SharedConstants.java'
        }
        resources {
            srcDirs 'src/main/resources'
        }
    }
}

// ========== 解除错误数量限制 ==========
tasks.withType(JavaCompile) {
    options.compilerArgs << '-Xmaxerrs' << '10000'
    options.compilerArgs << '-Xmaxwarns' << '10000'
    options.encoding = 'UTF-8'
}

// ========== 构建完整核心 ==========
task buildFullJar(type: Jar) {
    dependsOn compileJava
    
    // 设置重复文件处理策略
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    
    // 1. 从 src/main/resources/ 复制所有资源
    from 'src/main/resources'
    
    // 2. 从编译产物中提取所有 class
    from sourceSets.main.output
    
    // 3. 删除签名文件
    exclude 'META-INF/*.SF', 'META-INF/*.RSA', 'META-INF/*.DSA'
    
    archiveBaseName.set('minecraft')
    archiveVersion.set(project.minecraft_version)
    archiveClassifier.set('custom')
    
    manifest {
        attributes 'Main-Class': 'net.minecraft.client.main.Main'
    }
    
    destinationDirectory.set(file('build/libs'))
}

processResources {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

tasks.build {
    dependsOn tasks.buildFullJar
}
